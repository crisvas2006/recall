# Local demo stack: FastAPI backend + Phoenix (observability).
# Supabase is a managed/remote service — configured via DATABASE_URL in .env,
# not run here. The frontend runs separately (cd frontend && npm run dev).

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # inside the compose network, reach Phoenix by service name
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:6006/v1/traces
    depends_on:
      - phoenix
    volumes:
      - ./corpus:/app/corpus:ro       # mount the Markdown corpus for ingestion

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"                    # UI + OTLP collector
    # Phoenix persists in-memory by default; that's fine for a demo.
